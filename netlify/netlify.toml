# netlify/netlify.toml (修正后)

[build]
  command = "npm install && npm run build"
  publish = "build" 
  functions = "functions"

# 规则 1：首先处理主页请求 (最具体的)
# 将访问根路径的请求指向构建出的 index.html 文件。
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# 规则 2：处理所有其他请求 (最通用的)
# 将所有其他不匹配上面规则的请求都转发给代理函数。
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/proxy"
  status = 200
