# netlify/netlify.toml (修正后)

# [build] 这一节是 Netlify 如何构建你的站点的核心配置
[build]
  # 告诉 Netlify，在执行任何操作之前，先进入 'netlify' 这个子目录
  # 注意：这个 base 路径是相对于你的仓库根目录的
  base = "netlify"

  # command: 构建命令。Netlify 会先进入"base"目录，然后执行这个命令。
  command = "npm install && npm run build"
  
  # publish: 构建完成后要部署的静态文件目录。
  # 这个路径现在是相对于 "base" 目录的，所以 "build" 是正确的。
  publish = "build" 
  
  # functions: Netlify Functions 的存放目录。
  # 这个路径也是相对于 "base" 目录的。
  functions = "functions"

# [[redirects]] 规则保持不变
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/proxy"
  status = 200
