# netlify/netlify.toml

[build]
  command = "npm install && npm run build"
  publish = "build"
  functions = "functions"

# [[redirects]] 是 Netlify 用来配置路由规则的部分
# 这个规则告诉 Netlify，将所有请求都重写到我们的 proxy function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/proxy"
  status = 200 # 200 表示这是一个“重写”(rewrite)，而不是一个“重定向”(redirect)
